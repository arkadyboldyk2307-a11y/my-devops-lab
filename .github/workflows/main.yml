name: CI Pipeline

on:
  push:
    branches: [ "main" ] # Запускать робота при каждом пуше в ветку main
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest # GitHub выделяет нам чистую Linux-машину

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Шаг 1: Робот скачивает наш код

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest # Устанавливаем тестер

      - name: Run Tests
        run: |
          # Шаг 2: Запускаем наши тесты
          pytest app/test_app.py

      - name: Build Docker Image
        run: |
          # Шаг 3: Проверяем, что Docker-образ собирается без ошибок
          docker build ./app --file ./app/Dockerfile